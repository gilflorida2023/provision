---
- name: Gather and Report Host System Information
  hosts: all
  gather_facts: yes
  become: yes

  tasks:
    - name: Ensure inxi is installed
      apt:
        name: inxi
        state: present
      failed_when: false

    - name: Generate system report using inxi
      shell: inxi -Fxxrzc0
      register: inxi_output
      changed_when: false

    - name: Collect ALL facts
      setup:
        gather_subset: all

    - name: Extract CPU MHz from /proc/cpuinfo
      shell: grep "MHz" /proc/cpuinfo | awk '{print $4}' | cut -d. -f1
      register: cpu_mhz_raw
      changed_when: false

    - name: Build list of CPU speeds
      set_fact:
        cpu_speeds: "{{ cpu_mhz_raw.stdout_lines | map('int') | list }}"

    - name: Calculate average CPU speed
      set_fact:
        avg_cpu_speed: >-
          {% if cpu_speeds | length > 0 %}
            {{ (cpu_speeds | sum / cpu_speeds | length) | round(0) | int }}
          {% else %}
            N/A
          {% endif %}

    - name: Format uptime
      set_fact:
        uptime_formatted: >-
          {% set s = ansible_uptime_seconds | int %}
          {% set d = s // 86400 %}
          {% set h = (s % 86400) // 3600 %}
          {% set m = (s % 3600) // 60 %}
          {% set sec = s % 60 %}
          {{ '%4dd %2dh %2dm %2ds' | format(d, h, m, sec) }}

    - name: Get process count
      shell: ps -A --no-headers | wc -l
      register: proc_count
      changed_when: false

    - name: Ensure reports directory exists
      file:
        path: reports
        state: directory
      delegate_to: localhost
      run_once: true

    - name: Save report to file
      copy:
        content: "{{ inxi_output.stdout }}"
        dest: "reports/{{ inventory_hostname }}_report.txt"
      delegate_to: localhost
