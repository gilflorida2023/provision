---
- name: Install Essential packages
  hosts: all
  become: yes
  tasks:
    # Install other essential packages with better error handling
    - name: Update apt cache before installing packages
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - pass
          - git
          - htop
          - terminator
          - vim
          - gawk
          - jq
          - vlc
          - xclip
          - rustc
          - screen
          - ansible-core
          - lynx
          - python3.11-venv
        state: present
        # Add timeout to prevent indefinite hanging
        install_recommends: no
      async: 1800  # 30 minutes timeout
      poll: 10     # Check every 10 seconds

    - name: Display completion message
      ansible.builtin.debug:
        msg: "All packages installed and configured on {{ inventory_hostname }}"
