---
- name: Manage Brave Origin (Nightly/Beta)
  hosts: all
  become: yes
  vars:
    brave_channel: "beta"

  tasks:
    - name: Validate brave_channel
      ansible.builtin.assert:
        that:
          - brave_channel in ['beta', 'nightly']
        fail_msg: "brave_channel must be 'beta' or 'nightly', got '{{ brave_channel }}'"

    - name: Set package manager state
      ansible.builtin.shell:
        cmd: dpkg --configure -a
      changed_when: false
      failed_when: false

    - name: Clean up old Brave APT repo files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/brave-browser.list
        - /etc/apt/sources.list.d/brave-browser-beta.list
        - /etc/apt/sources.list.d/brave-browser-nightly.list
        - /etc/apt/sources.list.d/brave-browser-release.list
        - /etc/apt/sources.list.d/brave-browser-release.sources
        - /etc/apt/sources.list.d/brave-browser-beta.sources
        - /etc/apt/sources.list.d/brave-browser-nightly.sources
        - /usr/share/keyrings/brave-browser-archive-keyring.gpg
        - /usr/share/keyrings/brave-browser-beta-archive-keyring.gpg
        - /usr/share/keyrings/brave-browser-nightly-archive-keyring.gpg

    - name: Remove old regular Brave browser packages
      ansible.builtin.apt:
        name:
          - brave-browser
          - brave-browser-beta
          - brave-browser-nightly
        state: absent
        purge: yes

    - name: Install curl
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: yes

    - name: Define Brave Origin architecture
      ansible.builtin.set_fact:
        brave_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Add Brave apt repository keyring
      ansible.builtin.get_url:
        url: "https://brave-browser-apt-{{ brave_channel }}.s3.brave.com/brave-browser-{{ brave_channel }}-archive-keyring.gpg"
        dest: "/usr/share/keyrings/brave-browser-{{ brave_channel }}-archive-keyring.gpg"
        mode: '0644'

    - name: Add Brave apt repository
      ansible.builtin.copy:
        dest: "/etc/apt/sources.list.d/brave-browser-{{ brave_channel }}.sources"
        content: |
          Types: deb
          URIs: https://brave-browser-apt-{{ brave_channel }}.s3.brave.com/
          Suites: stable
          Architectures: {{ brave_arch }}
          Components: main
          Signed-By: /usr/share/keyrings/brave-browser-{{ brave_channel }}-archive-keyring.gpg
        mode: '0644'

    - name: Install brave-keyring dependency
      ansible.builtin.apt:
        name: brave-keyring
        state: present
        update_cache: yes

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: apt

    - name: Define Brave Origin variables
      ansible.builtin.set_fact:
        brave_package: "brave-origin-{{ brave_channel }}"
        brave_binary: "brave-origin-{{ brave_channel }}"
        brave_desktop: "brave-origin-{{ brave_channel }}.desktop"

    - name: Detect currently installed Brave Origin
      ansible.builtin.set_fact:
        current_package: >-
          {%- if 'brave-origin-nightly' in ansible_facts.packages -%}
            brave-origin-nightly
          {%- elif 'brave-origin-beta' in ansible_facts.packages -%}
            brave-origin-beta
          {%- else -%}
            none
          {%- endif -%}
        current_version: >-
          {%- if 'brave-origin-nightly' in ansible_facts.packages -%}
            {{ ansible_facts.packages['brave-origin-nightly'][0].version }}
          {%- elif 'brave-origin-beta' in ansible_facts.packages -%}
            {{ ansible_facts.packages['brave-origin-beta'][0].version }}
          {%- else -%}
            none
          {%- endif -%}

    - name: Fetch Brave Origin releases from GitHub API
      ansible.builtin.uri:
        url: "https://api.github.com/repos/brave/brave-browser/releases?per_page=60"
        return_content: yes
        headers:
          Accept: "application/vnd.github.v3+json"
      register: github_response
      retries: 3
      delay: 2

    - name: Write releases JSON to temp file
      ansible.builtin.copy:
        content: "{{ github_response.content }}"
        dest: /tmp/brave_releases.json
        mode: '0644'
      changed_when: false

    - name: Find latest Brave Origin {{ brave_channel }} release
      ansible.builtin.shell: |
        set -e
        python3 -c "
        import json
        channel = '{{ brave_channel }}'
        arch = '{{ brave_arch }}'
        with open('/tmp/brave_releases.json') as f:
            releases = json.load(f)
        for r in releases:
            tag = r['tag_name'].lstrip('v')
            target = f'brave-origin-{channel}_{tag}_{arch}.deb'
            for a in r.get('assets', []):
                if a['name'] == target:
                    print(f'version={tag}')
                    print(f'url={a[\"browser_download_url\"]}')
                    exit(0)
        print('ERROR: no matching release found', file=__import__('sys').stderr)
        exit(1)
        "
      register: release_cmd
      changed_when: false

    - name: Parse version and download URL
      ansible.builtin.set_fact:
        latest_version: "{{ release_cmd.stdout_lines[0].split('=', 1)[1] }}"
        download_url: "{{ release_cmd.stdout_lines[1].split('=', 1)[1] }}"

    - name: Determine if channel switch is needed
      ansible.builtin.set_fact:
        needs_switch: "{{ current_package != 'none' and current_package != brave_package }}"

    - name: Determine if upgrade is needed
      ansible.builtin.set_fact:
        needs_upgrade: "{{ current_version != 'none' and current_version is version(latest_version, '<') }}"

    - name: Remove current Brave Origin when switching channels
      ansible.builtin.apt:
        name:
          - brave-origin-nightly
          - brave-origin-beta
        state: absent
        purge: yes
      when: needs_switch

    - name: Download Brave Origin {{ brave_channel }} {{ latest_version }}
      ansible.builtin.get_url:
        url: "{{ download_url }}"
        dest: "/tmp/brave-origin-{{ brave_channel }}.deb"
        mode: '0644'
        force: yes
      when: current_package == 'none' or needs_switch or needs_upgrade

    - name: Install Brave Origin {{ brave_channel }}
      ansible.builtin.apt:
        deb: "/tmp/brave-origin-{{ brave_channel }}.deb"
        state: present
      when: current_package == 'none' or needs_switch or needs_upgrade

    - name: Register Brave Origin as system default browser
      ansible.builtin.alternatives:
        name: x-www-browser
        link: /usr/bin/x-www-browser
        path: "/usr/bin/{{ brave_binary }}"
        priority: 100

    - name: Set Brave Origin as user default web browser
      ansible.builtin.shell:
        cmd: "xdg-settings set default-web-browser {{ brave_desktop }}"
      become: yes
      become_user: "{{ ansible_user }}"
      register: xdg_result
      changed_when:
        - xdg_result.rc == 0
        - '"already" not in xdg_result.stderr | default("")'
      failed_when: false

    - name: Clean up temp files
      ansible.builtin.file:
        path:
          - /tmp/brave_releases.json
          - "/tmp/brave-origin-{{ brave_channel }}.deb"
        state: absent
